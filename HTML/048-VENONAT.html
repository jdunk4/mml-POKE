<m-group id="pokemon-group">
  <!--
    048-VENONAT VARIANTS
    ─────────────────────────────────────────────────────
    048-VENONAT                              https://assets.jdunkglbs.com/POKE-GEN1/048-venonat.gltf
    048-VENONAT-SHINY                        https://assets.jdunkglbs.com/POKE-GEN1/048-venonat-shiny.gltf
    Full asset list: https://cdn.jsdelivr.net/gh/jdunk4/mml-POKE@main/src/cf-assets.json
    To swap Pokémon: update variantKeys array in the script below
    ─────────────────────────────────────────────────────
  -->
  <m-model id="variant-0" ry="180" anim-enabled="true" anim-loop="true" anim-start-time="0" visible="true"></m-model>
  <m-model id="variant-1" ry="180" anim-enabled="true" anim-loop="true" anim-start-time="0" visible="false"></m-model>
  <m-cube id="trigger" visible="false" y="1" sx="2" sy="2" sz="2"></m-cube>
  <!-- trigger: click the invisible cube hovering over the model to cycle through variants -->
</m-group>

<script>
  const CF_BASE = "https://assets.jdunkglbs.com/POKE-GEN1";

  const variantKeys = [
    "048-VENONAT",
    "048-VENONAT-SHINY",
  ];

  function loadModels() {
    variantKeys.forEach((key, i) => {
      const url = `${CF_BASE}/${key.toLowerCase()}.gltf`;
      const el = document.getElementById(`variant-${i}`);
      el.setAttribute("src", url);
      el.setAttribute("anim", url);
    });
  }

  loadModels();

  let current = 0;
  const trigger = document.getElementById("trigger");

  trigger.addEventListener("click", () => {
    document.getElementById(`variant-${current}`).setAttribute("visible", "false");
    current = (current + 1) % variantKeys.length;
    document.getElementById(`variant-${current}`).setAttribute("visible", "true");
  });
</script>
