<m-group id="pokemon-group">
  <!--
    129-MAGIKARP VARIANTS
    ─────────────────────────────────────────────────────
    129-MAGIKARP                             https://assets.jdunkglbs.com/POKE-GEN1/129-magikarp.gltf
    129-MAGIKARP-SHINY                       https://assets.jdunkglbs.com/POKE-GEN1/129-magikarp-shiny.gltf
    129-MAGIKARP-APRICOT                     https://assets.jdunkglbs.com/POKE-GEN1/129-magikarp-apricot.gltf
    129-MAGIKARP-BLACK-MASK                  https://assets.jdunkglbs.com/POKE-GEN1/129-magikarp-black-mask.gltf
    129-MAGIKARP-BLUERAIN                    https://assets.jdunkglbs.com/POKE-GEN1/129-magikarp-bluerain.gltf
    129-MAGIKARP-BROWNZEBRA                  https://assets.jdunkglbs.com/POKE-GEN1/129-magikarp-brownzebra.gltf
    129-MAGIKARP-CALICAO                     https://assets.jdunkglbs.com/POKE-GEN1/129-magikarp-calicao.gltf
    129-MAGIKARP-GRAY                        https://assets.jdunkglbs.com/POKE-GEN1/129-magikarp-gray.gltf
    129-MAGIKARP-ORANGE-MASK                 https://assets.jdunkglbs.com/POKE-GEN1/129-magikarp-orange-mask.gltf
    129-MAGIKARP-PINK                        https://assets.jdunkglbs.com/POKE-GEN1/129-magikarp-pink.gltf
    129-MAGIKARP-PURPLE                      https://assets.jdunkglbs.com/POKE-GEN1/129-magikarp-purple.gltf
    129-MAGIKARP-SKELLY                      https://assets.jdunkglbs.com/POKE-GEN1/129-magikarp-skelly.gltf
    129-MAGIKARP-VIOLET                      https://assets.jdunkglbs.com/POKE-GEN1/129-magikarp-violet.gltf
    Full asset list: https://cdn.jsdelivr.net/gh/jdunk4/mml-POKE@main/src/cf-assets.json
    To swap Pokémon: update variantKeys array in the script below
    ─────────────────────────────────────────────────────
  -->
  <m-model id="variant-0" ry="180" anim-enabled="true" anim-loop="true" anim-start-time="0" visible="true"></m-model>
  <m-model id="variant-1" ry="180" anim-enabled="true" anim-loop="true" anim-start-time="0" visible="false"></m-model>
  <m-model id="variant-2" ry="180" anim-enabled="true" anim-loop="true" anim-start-time="0" visible="false"></m-model>
  <m-model id="variant-3" ry="180" anim-enabled="true" anim-loop="true" anim-start-time="0" visible="false"></m-model>
  <m-model id="variant-4" ry="180" anim-enabled="true" anim-loop="true" anim-start-time="0" visible="false"></m-model>
  <m-model id="variant-5" ry="180" anim-enabled="true" anim-loop="true" anim-start-time="0" visible="false"></m-model>
  <m-model id="variant-6" ry="180" anim-enabled="true" anim-loop="true" anim-start-time="0" visible="false"></m-model>
  <m-model id="variant-7" ry="180" anim-enabled="true" anim-loop="true" anim-start-time="0" visible="false"></m-model>
  <m-model id="variant-8" ry="180" anim-enabled="true" anim-loop="true" anim-start-time="0" visible="false"></m-model>
  <m-model id="variant-9" ry="180" anim-enabled="true" anim-loop="true" anim-start-time="0" visible="false"></m-model>
  <m-model id="variant-10" ry="180" anim-enabled="true" anim-loop="true" anim-start-time="0" visible="false"></m-model>
  <m-model id="variant-11" ry="180" anim-enabled="true" anim-loop="true" anim-start-time="0" visible="false"></m-model>
  <m-model id="variant-12" ry="180" anim-enabled="true" anim-loop="true" anim-start-time="0" visible="false"></m-model>
  <m-cube id="trigger" visible="false" y="1" sx="2" sy="2" sz="2"></m-cube>
  <!-- trigger: click the invisible cube hovering over the model to cycle through variants -->
</m-group>

<script>
  const CF_BASE = "https://assets.jdunkglbs.com/POKE-GEN1";

  const variantKeys = [
    "129-MAGIKARP",
    "129-MAGIKARP-SHINY",
    "129-MAGIKARP-APRICOT",
    "129-MAGIKARP-BLACK-MASK",
    "129-MAGIKARP-BLUERAIN",
    "129-MAGIKARP-BROWNZEBRA",
    "129-MAGIKARP-CALICAO",
    "129-MAGIKARP-GRAY",
    "129-MAGIKARP-ORANGE-MASK",
    "129-MAGIKARP-PINK",
    "129-MAGIKARP-PURPLE",
    "129-MAGIKARP-SKELLY",
    "129-MAGIKARP-VIOLET",
  ];

  function loadModels() {
    variantKeys.forEach((key, i) => {
      const url = `${CF_BASE}/${key.toLowerCase()}.gltf`;
      const el = document.getElementById(`variant-${i}`);
      el.setAttribute("src", url);
      el.setAttribute("anim", url);
    });
  }

  loadModels();

  let current = 0;
  const trigger = document.getElementById("trigger");

  trigger.addEventListener("click", () => {
    document.getElementById(`variant-${current}`).setAttribute("visible", "false");
    current = (current + 1) % variantKeys.length;
    document.getElementById(`variant-${current}`).setAttribute("visible", "true");
  });
</script>
